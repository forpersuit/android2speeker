name: Build Windows Executable

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Package to EXE with PyInstaller
      run: |
        python -m PyInstaller --onefile --clean --noconfirm --name "Android_Speaker" --icon="icon.ico" "stream_audio.py"

    - name: Upload Packaged Executable
      uses: actions/upload-artifact@v4
      with:
        name: Android_Speaker_Windows
        path: dist/Android_Speaker.exe
        if-no-files-found: error
        retention-days: 14
